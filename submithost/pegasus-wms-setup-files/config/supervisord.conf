[supervisord]
nodaemon=true
loglevel=debug
logfile=/var/log/supervisor/supervisord.log

[program:docker]
command=/usr/local/bin/wrapdocker
autorestart=True
startsecs=60
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
redirect_stderr=true

[program:condor_master]
user=jovyan
command=/usr/local/bin/htcondor-wrapper
autorestart=True
startsecs=60
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
redirect_stderr=true

[program:jupyterhub-singleuser]
command=jupyterhub-singleuser
directory=/home/jovyan
user=jovyan
autostart=true
autorestart=false
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
redirect_stderr=true

[program:dashboard]
user=jovyan
command=pegasus-service --host 0.0.0.0
autorestart=True
startsecs=60
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
redirect_stderr=true
environment = HOME="/home/jovyan",USER="jovyan"

